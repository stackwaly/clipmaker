<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipMaker - Gere Clips Virais</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23667eea;stop-opacity:1'/%3E%3Cstop offset='100%25' style='stop-color:%23764ba2;stop-opacity:1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='45' fill='url(%23grad)'/%3E%3Cpolygon points='40,30 40,70 70,50' fill='white'/%3E%3Crect x='15' y='15' width='16' height='16' fill='white' opacity='0.6' rx='2'/%3E%3Crect x='69' y='15' width='16' height='16' fill='white' opacity='0.6' rx='2'/%3E%3Crect x='15' y='69' width='16' height='16' fill='white' opacity='0.6' rx='2'/%3E%3Crect x='69' y='69' width='16' height='16' fill='white' opacity='0.6' rx='2'/%3E%3C/svg%3E">
</head>
<body>
    <div class="container">
        <div class="header">
            <svg class="logo-icon" xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'>
                <defs>
                    <linearGradient id='logoGrad' x1='0%' y1='0%' x2='100%' y2='100%'>
                        <stop offset='0%' style='stop-color:#667eea;stop-opacity:1'/>
                        <stop offset='100%' style='stop-color:#764ba2;stop-opacity:1'/>
                    </linearGradient>
                </defs>
                <!-- Background circle -->
                <circle cx='60' cy='60' r='55' fill='url(%23logoGrad)'/>
                <!-- Play button -->
                <polygon points='50,40 50,80 85,60' fill='white' class='play-button'/>
                <!-- Film strips (clips) -->
                <g class='clip clip-1'>
                    <rect x='20' y='20' width='18' height='18' fill='white' opacity='0.7' rx='2'/>
                    <rect x='24' y='24' width='10' height='10' fill='%23667eea' opacity='0.5'/>
                </g>
                <g class='clip clip-2'>
                    <rect x='82' y='20' width='18' height='18' fill='white' opacity='0.7' rx='2'/>
                    <rect x='86' y='24' width='10' height='10' fill='%23667eea' opacity='0.5'/>
                </g>
                <g class='clip clip-3'>
                    <rect x='20' y='82' width='18' height='18' fill='white' opacity='0.7' rx='2'/>
                    <rect x='24' y='86' width='10' height='10' fill='%23667eea' opacity='0.5'/>
                </g>
                <g class='clip clip-4'>
                    <rect x='82' y='82' width='18' height='18' fill='white' opacity='0.7' rx='2'/>
                    <rect x='86' y='86' width='10' height='10' fill='%23667eea' opacity='0.5'/>
                </g>
            </svg>
            <h1>ClipMaker</h1>
            <p>Transforme vídeos em clips virais para TikTok e Shorts</p>
        </div>

        <div id="alert"></div>

        <div class="steps">
            <div class="step active" id="step1">
                <div class="step-number">1</div>
                <span>Upload</span>
            </div>
            <div class="step" id="step2">
                <div class="step-number">2</div>
                <span>Análise IA</span>
            </div>
            <div class="step" id="step3">
                <div class="step-number">3</div>
                <span>Gerar Clips</span>
            </div>
        </div>

        <form id="clipForm">
            <div class="form-group">
                <label for="upload">📹 Enviar Vídeo (Cloudinary)</label>
                <button type="button" id="upload_widget" class="btn-secondary btn-full-width">
                    Clique para enviar vídeo
                </button>
                <input type="hidden" id="videoUrl" name="videoUrl">
                <input type="hidden" id="videoDuration" name="videoDuration">
            </div>

            <div class="form-group">
                <label for="transcription">📝 Transcrição (ou Cole Aqui)</label>
                <textarea id="transcription" name="transcription"
                    placeholder="Cole aqui a transcrição do seu vídeo, ou use o upload automático..."></textarea>
                <small class="hint-text">
                    Dica: Quanto mais detalhada a transcrição, melhor a análise!
                </small>
            </div>

            <div class="buttons">
                <button type="button" id="analyzeBtn" class="btn-primary">
                    🔍 Analisar Momentos Virais
                </button>
                <button type="reset" class="btn-secondary">Limpar</button>
            </div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p id="loadingText">Processando...</p>
        </div>

        <div class="results" id="results">
            <div id="analysisResults"></div>
            <div id="clipsResults"></div>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>
    <script src="./app.js"></script>
</body>
</html>
